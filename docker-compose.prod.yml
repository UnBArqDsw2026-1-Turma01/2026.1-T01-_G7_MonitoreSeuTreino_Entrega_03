name: monitore-seu-treino-prod

services:
  db:
    image: postgres:16-alpine
    container_name: monitore_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitore_api
    restart: always
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    container_name: monitore_docs
    restart: always
    ports:
      - "8000:8000"

volumes:
  postgres_data:
