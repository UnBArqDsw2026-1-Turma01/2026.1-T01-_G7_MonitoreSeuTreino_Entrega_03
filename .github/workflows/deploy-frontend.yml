name: Deploy — Frontend (Railway)

# Secrets necessários no repositório:
#   RAILWAY_TOKEN           → Settings > Railway > Token (account ou project token)
#   RAILWAY_SERVICE_ID_WEB  → ID do serviço "web" no Railway (Dashboard > Service > Settings > Service ID)
#   VITE_API_URL            → URL pública do backend no Railway (ex: https://api-xxxx.up.railway.app)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    name: Build & deploy Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/apps/web/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check & build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID_WEB }} --detach
