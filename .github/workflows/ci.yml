name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Detecta o que mudou ────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs:     ${{ steps.filter.outputs.docs }}
      docker:   ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docs:
              - 'docs/**'
            docker:
              - 'docker-compose*.yml'
              - 'backend/Dockerfile*'
              - 'frontend/**/Dockerfile*'
              - 'docs/Dockerfile'

  # ── Valida PR para main só vinda de dev ────────────────────────────────────
  branch-policy:
    name: Branch policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Require PR from dev
        if: github.head_ref != 'dev'
        run: |
          echo "❌ PRs para main só são aceitos a partir da branch dev."
          echo "   Branch de origem: ${{ github.head_ref }}"
          exit 1
      - name: OK
        run: echo "✅ Branch de origem válida."

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint, build & test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: monitore
          POSTGRES_PASSWORD: monitore
          POSTGRES_DB: monitore_seu_treino
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://monitore:monitore@localhost:5432/monitore_seu_treino?schema=public
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://monitore:monitore@localhost:5432/monitore_seu_treino?schema=public
        run: npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://monitore:monitore@localhost:5432/monitore_seu_treino?schema=public
        run: npm run test

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint, build & test
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/apps/web/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check & build
        env:
          VITE_API_URL: http://localhost:3000/api
        run: pnpm build

      - name: Run tests
        run: pnpm test

  # ── Docs ───────────────────────────────────────────────────────────────────
  docs:
    name: Docs — build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build -f docs/mkdocs.yml --strict

  # ── Docker ─────────────────────────────────────────────────────────────────
  docker:
    name: Docker — validate compose
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config --quiet
        env:
          POSTGRES_USER: monitore
          POSTGRES_PASSWORD: monitore
          POSTGRES_DB: monitore_seu_treino

  # ── Agregador (required check) ─────────────────────────────────────────────
  ci:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [changes, branch-policy, backend, frontend, docs, docker]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"

          failed=$(echo "$results" | \
            python3 -c "
          import sys, json
          needs = json.load(sys.stdin)
          skip = {'changes'}
          failed = [
            name for name, v in needs.items()
            if name not in skip and v['result'] not in ('success', 'skipped')
          ]
          print('\n'.join(failed))
          ")

          if [ -n "$failed" ]; then
            echo "❌ Jobs com falha:"
            echo "$failed"
            exit 1
          fi
          echo "✅ Todos os checks passaram."
